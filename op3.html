
<html>
<head>
<title>26_TV_HD</title>
<meta name="robots" content="noindex">
<meta content='width=device-width, initial-scale=1' name='viewport'>	
<meta http-equiv="Content-Language" content="es" />	
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">	
<body  style="padding: 0px; margin:0px;"><body>
<meta name='referrer' content='no-referrer' />
<script src="https://cdn.jsdelivr.net/clappr/latest/clappr.min.js" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/clappr.level-selector/latest/level-selector.min.js" type="text/javascript"></script>
<div id="oper"></div>
<div id="vid"></div>
<script>
 player = new Clappr.Player({
 source: "http://live-edge01.telecentro.net.ar:1935/live/26hd-720/playlist.m3u8",
 mimeType: "application/x-mpegURL",
 autoPlay: true, 
 height: "100%",
 width: "100%",
 plugins: {"core": [LevelSelector]}, 
 parentId: "#vid"});
</script>
</body>
</head>
</html>
